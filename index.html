<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        
        [data-theme="dark"]{
            --bg:#0a0a0a;--bg2:#111;--surface:#161616;--surface2:#1c1c1c;--surface3:#242424;
            --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.18);
            --blue:#3b82f6;--blue-light:#60a5fa;--blue-dim:rgba(59,130,246,0.12);--blue-dim2:rgba(59,130,246,0.07);
            --green:#22c55e;--green-dim:rgba(34,197,94,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);
            --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,0.12);
            --text:#f0f0f0;--text2:#a0a0a0;--text3:#666;
            --shadow:0 1px 3px rgba(0,0,0,0.6),0 4px 16px rgba(0,0,0,0.5);
            --shadow2:0 2px 12px rgba(0,0,0,0.7),0 8px 40px rgba(0,0,0,0.6);
        }

        :root{
            --r:8px;--r2:12px;--r3:18px;--sans:'Inter', sans-serif;
            --topbar-h:58px;
        }

        html,body{
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
        }

        .ms {
            font-family: 'Material Symbols Outlined';
            font-style: normal;
            font-size: 22px;
            line-height: 1;
            display: inline-block;
            vertical-align: middle;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            transition: all 0.2s ease;
        }

        .ripple-host { position: relative; overflow: hidden; cursor: pointer; }
        .ripple-host .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

        #main-app { display: flex; flex-direction: column; height: 100vh; }
        
        #topbar {
            height: var(--topbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 100;
        }

        .tb-left { display: flex; align-items: center; gap: 12px; }
        .tb-logo-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--blue-dim);
            display: flex; align-items: center; justify-content: center;
            color: var(--blue-light);
        }
        .tb-logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; font-family: var(--sans); }
        .tb-logo-text span { color: var(--blue); }

        #app-body { display: flex; flex: 1; overflow: hidden; }

        #sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 24px; gap: 20px;
        }

        .sb-section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--sans); }

        .input-wrapper { display: flex; flex-direction: column; gap: 8px; }
        textarea {
            width: 100%; height: 180px;
            background: var(--surface2);
            border: 1.5px solid var(--border2);
            border-radius: var(--r);
            color: var(--text);
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            resize: none; outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--blue); background: var(--surface3); }

        .btn {
            height: 46px; padding: 0 16px; border-radius: var(--r2);
            font-size: 14px; font-weight: 700; font-family: var(--sans);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.2s;
            color: white; border: none; outline: none;
        }
        .btn-primary { background: var(--blue); box-shadow: var(--shadow); }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border2); }
        .btn-secondary:hover { background: var(--surface3); }

        .btn-icon-only {
            width: 46px; height: 46px; padding: 0; border-radius: var(--r2);
            display: flex; align-items: center; justify-content: center;
            background: var(--surface2); color: var(--text); border: 1.5px solid var(--border2);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .btn-icon-only:hover { background: var(--surface3); border-color: var(--border3); transform: translateY(-1px); }
        .btn-icon-only.success { color: var(--green); border-color: var(--green); background: var(--green-dim); }

        .grid-action { display: flex; gap: 10px; }
        .grid-action .btn-primary { flex: 1; }

        #main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg2); padding: 24px; gap: 20px; overflow-y: auto; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
        .stat-card {
            background: var(--surface); padding: 20px; border-radius: var(--r2);
            border: 1px solid var(--border); display: flex; align-items: center; gap: 16px;
            box-shadow: var(--shadow);
        }
        .stat-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; font-family: var(--sans); }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--text); font-family: var(--sans); }

        .terminal-card {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r2); display: flex; flex-direction: column;
            overflow: hidden; box-shadow: var(--shadow2);
        }
        .terminal-header {
            padding: 14px 20px; background: var(--surface2); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .terminal-body {
            flex: 1; padding: 20px; font-family: 'JetBrains Mono', monospace;
            font-size: 13px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }

        .log-entry {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 10px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.02);
            animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .log-icon { font-size: 20px !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

        @media (max-width: 900px) {
            #app-body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            #main-content { padding: 16px; }
        }
    </style>
</head>
<body>

<div id="main-app">
    <header id="topbar">
        <div class="tb-left">
            <div class="tb-logo-icon">
            </div>
        </div>
    </header>

    <div id="app-body">
        <aside id="sidebar">
            <div class="sb-section-label">Painel de Controle</div>
            
            <div class="input-wrapper">
                <label class="sb-section-label" style="font-size: 10px; opacity: 0.6;">Lista de Links</label>
                <textarea id="linksInput" placeholder="Insira os links para verificação..."></textarea>
            </div>

            <div class="grid-action">
                <button class="btn btn-primary ripple-host" id="startBtn" onclick="startChecker(event)">
                    <span class="ms">play_circle</span>
                    Iniciar
                </button>
                <button class="btn-icon-only ripple-host" id="copyBtn" onclick="copyValids(event)" title="Copiar Válidos">
                    <span class="ms" id="copyIcon">content_copy</span>
                </button>
                <button class="btn-icon-only ripple-host" onclick="downloadValids(event)" title="Baixar Válidos">
                    <span class="ms">download</span>
                </button>
            </div>

            <button class="btn btn-secondary ripple-host" onclick="document.getElementById('fileInput').click()">
                <span class="ms">upload_file</span>
                Importar .txt
            </button>
            <input type="file" id="fileInput" style="display: none;" onchange="handleFile(event)" accept=".txt">

            <div style="margin-top: auto; padding: 14px; background: var(--blue-dim2); border-radius: 14px; border: 1px solid var(--blue-dim);">
                <div style="font-size: 11px; font-weight: 800; color: var(--blue-light); font-family: var(--sans);">SISTEMA ATIVO</div>
                <div style="font-size: 10px; color: var(--text2); margin-top: 6px; font-family: var(--sans); line-height: 1.4;">Utilizando motor de verificação de alta velocidade.</div>
            </div>
        </aside>

        <main id="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--blue-dim); color: var(--blue-light);">
                        <span class="ms">analytics</span>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="stat-total">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--green-dim); color: var(--green);">
                        <span class="ms">check_circle</span>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Válidos</span>
                        <span class="stat-value" id="stat-valid">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--red-dim); color: var(--red);">
                        <span class="ms">cancel</span>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Inválidos</span>
                        <span class="stat-value" id="stat-invalid">0</span>
                    </div>
                </div>
            </div>

            <div class="terminal-card">
                <div class="terminal-header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="ms" style="font-size: 20px; color: var(--blue);">terminal</span>
                        <span style="font-size: 12px; font-weight: 800; color: var(--text2); font-family: var(--sans);">LOGS DE OPERAÇÃO</span>
                    </div>
                    <span class="ms" style="font-size: 20px; cursor: pointer; color: var(--text3);" onclick="document.getElementById('terminal').innerHTML=''">delete_sweep</span>
                </div>
                <div class="terminal-body" id="terminal">
                    <div class="log-entry">
                        <span class="ms log-icon" style="color: var(--blue);">info</span>
                        <div style="color: var(--text2);">Aguardando entrada para iniciar verificação...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    // Ripple Effect Logic
    document.addEventListener('mousedown', function(e) {
        const host = e.target.closest('.ripple-host');
        if (!host) return;
        
        const circle = document.createElement("span");
        const diameter = Math.max(host.clientWidth, host.clientHeight);
        const radius = diameter / 2;

        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${e.clientX - host.getBoundingClientRect().left - radius}px`;
        circle.style.top = `${e.clientY - host.getBoundingClientRect().top - radius}px`;
        circle.classList.add("ripple");

        const ripple = host.getElementsByClassName("ripple")[0];
        if (ripple) ripple.remove();
        host.appendChild(circle);
    });

    // Checker Core Logic
    const CONFIG = { delay: 1000 };
    let stats = { total: 0, checked: 0, valid: 0, invalid: 0, isRunning: false, validLinks: [] };

    function addLog(msg, type = 'info') {
        const terminal = document.getElementById('terminal');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        const types = {
            valid: { icon: 'check_circle', color: 'var(--green)' },
            invalid: { icon: 'cancel', color: 'var(--red)' },
            warning: { icon: 'warning', color: 'var(--yellow)' },
            info: { icon: 'info', color: 'var(--blue)' }
        };
        
        const config = types[type] || types.info;
        entry.innerHTML = `
            <span class="ms log-icon" style="color: ${config.color}">${config.icon}</span>
            <div style="color: ${type === 'info' ? 'var(--text2)' : config.color}">${msg}</div>
        `;
        terminal.appendChild(entry);
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function checkNitro(code) {
        const url = `https://discord.com/api/v9/entitlements/gift-codes/${code}?with_application=false&with_subscription_plan=true`;
        try {
            const response = await fetch(url);
            if (response.status === 200) {
                const data = await response.json();
                return (data.uses < data.max_uses) ? 'VALID' : 'CLAIMED';
            }
            return response.status === 429 ? 'RATE_LIMIT' : 'INVALID';
        } catch (err) { return 'CORS_ERROR'; }
    }

    async function startChecker(e) {
        if (stats.isRunning) return;
        const input = document.getElementById('linksInput').value.trim();
        let links = input.split('\n').map(l => l.trim()).filter(Boolean);
        if (links.length === 0) {
            addLog("Nenhum link detectado.", "warning");
            return;
        }

        stats = { total: links.length, checked: 0, valid: 0, invalid: 0, isRunning: true, validLinks: [] };
        updateStats();
        
        const btn = document.getElementById('startBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="ms">sync</span> Verificando...';
        
        addLog(`Motor iniciado: Processando ${links.length} itens.`, "info");

        for (let i = 0; i < links.length; i++) {
            if (!stats.isRunning) break;
            let link = links[i];
            let code = link.includes('/') ? link.split('/').pop().split('?')[0] : link;

            const result = await checkNitro(code);

            if (result === 'VALID') {
                stats.valid++; stats.validLinks.push(link);
                addLog(`SUCESSO: ${link}`, "valid");
            } else if (result === 'RATE_LIMIT') {
                addLog("Rate limit atingido. Aguardando 10s...", "warning");
                await new Promise(r => setTimeout(r, 10000));
                i--; continue;
            } else if (result === 'CORS_ERROR') {
                addLog("CORS Error detectado.", "invalid");
                break;
            } else {
                stats.invalid++;
                addLog(`FALHA: ${link}`, "invalid");
            }

            stats.checked++;
            updateStats();
            await new Promise(r => setTimeout(r, CONFIG.delay));
        }

        stats.isRunning = false;
        btn.disabled = false;
        btn.innerHTML = '<span class="ms">play_circle</span> Iniciar';
        addLog("Processo finalizado.", "info");
    }

    function updateStats() {
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-valid').textContent = stats.valid;
        document.getElementById('stat-invalid').textContent = stats.invalid;
    }

    function handleFile(e) { 
        const reader = new FileReader(); 
        reader.onload = (e) => {
            document.getElementById('linksInput').value = e.target.result;
            addLog("Arquivo importado com sucesso.", "info");
        };
        reader.readAsText(e.target.files[0]); 
    }

    function copyValids(e) { 
        if (stats.validLinks.length === 0) return;
        navigator.clipboard.writeText(stats.validLinks.join('\n')); 
        
        const btn = document.getElementById('copyBtn');
        const icon = document.getElementById('copyIcon');
        
        // Feedback visual
        btn.classList.add('success');
        icon.textContent = 'check';
        
        setTimeout(() => {
            btn.classList.remove('success');
            icon.textContent = 'content_copy';
        }, 2000);
        
        addLog("Links válidos copiados!", "info");
    }

    function downloadValids(e) { 
        if (stats.validLinks.length === 0) return;
        const blob = new Blob([stats.validLinks.join('\n')], { type: 'text/plain' }); 
        const url = URL.createObjectURL(blob); 
        const a = document.createElement('a'); 
        a.href = url; a.download = 'validos.txt'; a.click(); 
    }
</script>
</body>
</html>
